spring.application.name=foundit-backend

# ── Database ──────────────────────────────────────────────────────────────────
# Reads from env vars on Railway (MYSQLHOST, etc), falls back to local MySQL for development
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:foundit_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:sanjay2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── File Storage ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ── Security & JWT ────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:foundit_jwt_secret_key_2025_change_in_production_so_make_it_long_enough_for_hs256}
jwt.expiration=86400000

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Groq Vision API (Free) ────────────────────────────────────────────────────
# Set GROQ_API_KEY as environment variable (Railway) or directly below for local dev
groq.api.key=${GROQ_API_KEY:}

# ── HuggingFace Embeddings (optional token for higher rate limits) ─────────────
huggingface.api.key=${HUGGINGFACE_API_KEY:}

# ── Cloudinary (cloud image storage for production) ───────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
