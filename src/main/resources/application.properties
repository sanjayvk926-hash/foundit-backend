spring.application.name=foundit-backend
server.port=${PORT:8080}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.foundit=DEBUG

# ── Database ──────────────────────────────────────────────────────────────────
# Reads from env vars (MYSQLHOST, etc), falls back to local MySQL for development
# For Aiven MySQL, useSSL=true is required.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:foundit_db}?createDatabaseIfNotExist=true&useSSL=${MYSQL_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:sanjay2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── File Storage ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ── Security & JWT ────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:foundit_jwt_secret_key_2025_change_in_production_so_make_it_long_enough_for_hs256}
jwt.expiration=86400000

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Groq Vision API (Free) ────────────────────────────────────────────────────
# Set GROQ_API_KEY as environment variable (Railway/Render) or directly below for local dev
# Get your free key at: https://console.groq.com
groq.api.key=${GROQ_API_KEY:}
