# Production configuration using H2 for zero-setup hackathon hosting
spring.datasource.url=jdbc:h2:file:./data/founditdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Security & JWT (Should be set via environment variable in Render)
jwt.secret=${JWT_SECRET:hackathon_secret_key_change_in_production_1234567890}
jwt.expiration=86400000

# File Storage
file.upload-dir=./data/uploads
